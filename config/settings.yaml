project:
  name: ai-knowledge-crawler
  version: "0.1.0"
  environment: development

paths:
  knowledge_base: knowledge_base
  prompts: .qoder/prompts
  config: config

defaults:
  language: zh-CN
  default_relevance_threshold: 6.0

llm:
  provider: qwen
  model: qwen-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  timeout: 60

proxy:
  enabled: true
  url: ""
  auto_detect: true
  host: 127.0.0.1
  ports: [7899, 7897, 7898]

runtime:
  default_analysis_limit: 10
  api_host: 127.0.0.1
  api_port: 8000
  frontend_port: 5173
